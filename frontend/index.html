<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saku Catatan - Simpan Ide Kamu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* Untuk efek smooth scroll saat edit */
        html { scroll-behavior: smooth; }
        
        /* Custom scrollbar untuk textarea */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">
    
    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="p-2.5 bg-indigo-600 rounded-xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6c0-1.216-.5-2.288-1.304-3.116m-11.392 0A6 6 0 0 0 6 12.75a6 6 0 0 0 6 6m2.25-12a13.931 13.931 0 0 1 12 12.75m-2.25-12a13.93 13.93 0 0 0-12 12.75" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-950">Saku<span class="text-indigo-600">Catatan</span></h1>
            </div>
            <a href="#form-section" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-5 rounded-xl transition flex items-center gap-2 text-sm shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                    <path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
                </svg>
                Catatan Baru
            </a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 md:py-16">
        
        <section id="form-section" class="mb-16 scroll-mt-24">
            <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
                <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-5">
                    <h2 id="form-title" class="text-xl font-semibold text-slate-950">Buat Catatan Baru</h2>
                </div>
                
                <form id="form-catatan" class="flex flex-col gap-5">
                    <input type="hidden" id="note-id">
                    
                    <div>
                        <label for="judul" class="block text-sm font-medium text-slate-600 mb-1.5">Judul</label>
                        <input type="text" id="judul" placeholder="Misal: Belanja Bulanan" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 transition bg-slate-50" required>
                    </div>
                    
                    <div>
                        <label for="isi" class="block text-sm font-medium text-slate-600 mb-1.5">Isi Catatan</label>
                        <textarea id="isi" placeholder="Tulis detail rencana kamu di sini..." rows="5" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 transition bg-slate-50 resize-none" required></textarea>
                    </div>
                    
                    <div class="flex gap-3 pt-2">
                        <button type="submit" id="btn-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-md flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                                <path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
                            </svg>
                            Simpan Catatan
                        </button>
                        <button type="button" id="btn-cancel" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl transition duration-200 hidden flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                                <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                            </svg>
                            Batal
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold text-slate-950">Semua Catatan</h2>
                <span id="note-count" class="text-sm font-medium bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-100 text-slate-600">0 Catatan</span>
            </div>

            <div id="daftar-catatan" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            
            <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-slate-100 shadow-sm">
                <div class="mx-auto w-24 h-24 text-indigo-200 mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                </div>
                <h3 class="text-xl font-semibold text-slate-800 mb-2">Belum ada catatan</h3>
                <p class="text-slate-500">Klik tombol "Catatan Baru" di atas untuk mulai menulis ide kamu.</p>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-200 mt-20 bg-white">
        <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-slate-500">
            &copy; 2023 SakuCatatan Lokal. Syarat aplikasi terpenuhi.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
